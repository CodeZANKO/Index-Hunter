<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IndexHunter — Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box; }
    :root { --primary:#6366f1; --primary2:#8b5cf6; }
    body { margin:0; font-family:'Inter',system-ui,-apple-system,sans-serif; min-height:100vh;
           background:#0a0e1a; color:#f1f5f9; overflow:hidden; }
    .bg-glow { position:fixed; inset:0; z-index:0; background:
        radial-gradient(60vw 60vw at 15% 10%, rgba(99,102,241,0.18), transparent 60%),
        radial-gradient(50vw 50vw at 90% 90%, rgba(139,92,246,0.15), transparent 55%); }
    .grid-bg { position:fixed; inset:0; z-index:0; opacity:.4;
       background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
       background-size:42px 42px; mask-image:radial-gradient(circle at center,#000,transparent 80%); }
    .card { position:relative; z-index:1; width:min(400px,92vw); }
    .input { background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.08);
             border-radius:10px; padding:12px 14px 12px 42px; color:#f1f5f9; font-size:14px;
             width:100%; outline:none; transition:border-color .2s,box-shadow .2s; }
    .input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(99,102,241,0.2); }
    .input-wrap { position:relative; }
    .input-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:#64748b; }
    .btn { width:100%; padding:12px; border-radius:10px; border:none; cursor:pointer;
           font-size:14px; font-weight:600; color:#fff;
           background:linear-gradient(135deg,#6366f1,#8b5cf6); transition:opacity .15s,transform .1s; }
    .btn:hover { opacity:.92; } .btn:active { transform:scale(.98); }
    .btn[disabled] { opacity:.6; cursor:not-allowed; }
    .err { color:#f87171; font-size:13px; min-height:18px; }
    .brand-mark { width:46px;height:46px;border-radius:12px;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;
      justify-content:center;font-size:22px;font-weight:800;color:#fff; }
    @keyframes fade { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .card { animation:fade .4s ease; }
  </style>
</head>
<body class="flex items-center justify-center">
  <div class="bg-glow"></div>
  <div class="grid-bg"></div>

  <div class="card">
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:26px">
      <div class="brand-mark">I</div>
      <div style="font-size:24px;font-weight:800;letter-spacing:-.02em;margin-top:14px">IndexHunter</div>
      <div style="font-size:11px;color:#64748b;letter-spacing:.14em;margin-top:2px">SECURITY FILE SCANNER</div>
    </div>

    <div style="background:rgba(26,31,46,0.7);border:1px solid rgba(255,255,255,0.08);
                border-radius:16px;padding:26px 24px;backdrop-filter:blur(12px);
                box-shadow:0 20px 50px rgba(0,0,0,0.4)">
      <div style="font-size:17px;font-weight:700;margin-bottom:4px">Sign in to continue</div>
      <div style="font-size:13px;color:#94a3b8;margin-bottom:20px">Enter your credentials to access the scanner.</div>

      <form id="loginForm" autocomplete="off">
        <label style="font-size:12px;color:#94a3b8;display:block;margin-bottom:6px">Username</label>
        <div class="input-wrap" style="margin-bottom:14px">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input id="username" class="input" type="text" placeholder="admin" autofocus />
        </div>

        <label style="font-size:12px;color:#94a3b8;display:block;margin-bottom:6px">Password</label>
        <div class="input-wrap" style="margin-bottom:8px">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="password" class="input" type="password" placeholder="••••••••" />
        </div>

        <div id="errMsg" class="err" style="margin:6px 0 12px"></div>

        <button id="submitBtn" class="btn" type="submit">Sign in</button>
      </form>
    </div>

    <div style="text-align:center;font-size:11px;color:#475569;margin-top:18px">
      For authorized security testing only. Unauthorized use is prohibited.
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const form = $("loginForm");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = $("errMsg");
      err.textContent = "";
      const btn = $("submitBtn");
      const u = $("username").value.trim();
      const p = $("password").value;
      if (!u || !p) { err.textContent = "Username and password are required."; return; }
      btn.disabled = true; btn.textContent = "Signing in…";
      try {
        const r = await fetch("/api/login", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ username:u, password:p }),
        });
        const j = await r.json().catch(() => ({}));
        if (r.ok && j.ok) {
          localStorage.setItem("indexhunter_token", j.token);
          window.location.href = "/";
        } else {
          err.textContent = j.error || "Login failed.";
          btn.disabled = false; btn.textContent = "Sign in";
        }
      } catch (e) {
        err.textContent = "Connection error.";
        btn.disabled = false; btn.textContent = "Sign in";
      }
    });
  </script>
</body>
</html>
